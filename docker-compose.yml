# Local development Postgres. Pinned to the same major version Neon runs (17)
# so dev and production behave identically.
#   Start:  npm run db:up   (docker compose up -d)
#   Stop:   npm run db:down
#   Wipe:   docker compose down -v
services:
  postgres:
    image: postgres:17
    container_name: decisionbroker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: decisionbroker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d decisionbroker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
